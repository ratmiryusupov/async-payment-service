version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: payments_postgres
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: payments_user
      POSTGRES_PASSWORD: payments_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.docker

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payments_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: payments_user
      RABBITMQ_DEFAULT_PASS: payments_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    command: >
      sh -c "
        echo 'Waiting for Postgres...' &&
        sleep 3 &&
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8000:8000"

  publisher:
    build: .
    command: python -m workers.outbox_publisher
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started

  consumer:
    build: .
    command: python -m workers.payment_consumer
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started

  dlq_consumer:
    build: .
    command: python -m workers.dlq_consumer
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started

volumes:
  postgres_data: